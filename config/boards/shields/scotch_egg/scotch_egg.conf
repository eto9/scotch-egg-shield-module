# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_SLEEP=y
#v0.3でDeprecated
#CONFIG_NFCT_PINS_AS_GPIOS=y

#BLE経由のstudio接続
CONFIG_ZMK_STUDIO_TRANSPORT_BLE=n
CONFIG_ZMK_STUDIO_LOCK_BLE_DIRECT_ADVERTISING_ON_UNLOCK=n

# zmk-module-ble-management
CONFIG_ZMK_BLE_MANAGEMENT=y
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=y

#battery monitorはcol11に接続されているため、バッテリー関連の機能は全て無効化する
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_BATTERY=n
# zmk-module-battery-history
CONFIG_ZMK_BATTERY_HISTORY=n
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=n

# zmk-module-settings-rpc
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_RPC_STUDIO=y

# zmk-module-runtime-input-processor
#CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=y
#CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=y

